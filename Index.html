<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ElitePlan: Denní Plánovač a Úkoly</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google AdMob Skript s Vaším ID APLIKACE -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6857383255513484" crossorigin="anonymous"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); --text: #f8fafc; }
        .light-mode { --bg: #f1f5f9; --card: rgba(255, 255, 255, 0.8); --text: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); transition: background-color 0.4s ease; overflow-x: hidden; }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .day-card.active { background: #3b82f6 !important; transform: translateY(-5px); color: white !important; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .active-cat { border-color: white !important; transform: scale(1.1); }
        .repeat-active { color: #10b981 !important; opacity: 1 !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="p-6 sticky top-0 z-30 bg-opacity-80 backdrop-blur-md">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 id="month-display" class="text-xl font-extrabold opacity-90 uppercase tracking-tighter italic">Plánovač</h1>
                <div class="flex gap-4 text-xs mt-1">
                    <span class="text-amber-400 font-bold">🔥 <span id="streak-val">0</span> DNÍ</span>
                    <span class="text-blue-400 font-bold">⭐ <span id="xp-val">0</span> XP</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleTheme()" class="p-2 glass rounded-xl shadow-sm">🌓</button>
                <button onclick="goToToday()" class="px-4 py-2 glass rounded-xl font-bold text-xs uppercase tracking-widest shadow-sm text-blue-400">Dnes</button>
            </div>
        </div>
        <div id="calendar-strip" class="flex gap-3 overflow-x-auto pb-2 hide-scrollbar"></div>
    </header>

    <main class="flex-grow px-6 pb-52">
        <ul id="task-list" class="space-y-4"></ul>
    </main>

    <!-- Panel pro přidávání úkolů a REKLAMA dole -->
    <div class="fixed bottom-0 left-0 right-0 z-40 bg-gradient-to-t from-[var(--bg)] via-[var(--bg)] to-transparent">
        
        <div class="max-w-2xl mx-auto px-6 mb-4">
            <div class="glass p-5 rounded-[2.5rem] shadow-2xl border-t border-white/20">
                <input type="text" id="task-input" placeholder="Přidat úkol..." class="bg-transparent w-full px-4 py-2 focus:outline-none text-lg">
                
                <div class="flex justify-between items-center pt-4 border-t border-white/10">
                    <div class="flex gap-3 items-center" id="category-selector">
                        <button onclick="setCat('blue')" class="w-8 h-8 rounded-full bg-blue-500 border-2 border-transparent transition-all" id="cat-blue"></button>
                        <button onclick="setCat('emerald')" class="w-8 h-8 rounded-full bg-emerald-500 border-2 border-transparent transition-all" id="cat-emerald"></button>
                        <button onclick="setCat('rose')" class="w-8 h-8 rounded-full bg-rose-500 border-2 border-transparent transition-all" id="cat-rose"></button>
                        
                        <!-- Tlačítko pro opakování -->
                        <button onclick="toggleRepeat()" id="repeat-btn" class="ml-2 opacity-30 transition-all text-xl" title="Opakovat denně">🔄</button>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <input type="time" id="task-time" class="bg-transparent text-xs font-bold opacity-70 outline-none">
                        <button onclick="addTask()" class="bg-blue-600 p-4 rounded-2xl shadow-xl shadow-blue-500/30">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- REKLAMNÍ BANNER ÚPLNĚ DOLE -->
        <div class="w-full bg-[var(--bg)] py-2 flex items-center justify-center border-t border-white/5">
            <div class="w-[320px] h-[50px] overflow-hidden">
                <ins class="adsbygoogle"
                     style="display:inline-block;width:320px;height:50px"
                     data-ad-client="ca-pub-6857383255513484" 
                     data-ad-slot="2730875239"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator && window.location.protocol.startsWith('http')) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW zaregistrován'))
                    .catch(err => console.warn('SW registrace selhala:', err));
            });
        }

        let selectedDate = new Date(); selectedDate.setHours(0,0,0,0);
        let currentCat = 'blue';
        let isRepeating = false;
        let userData = JSON.parse(localStorage.getItem('user_stats')) || { xp: 0, streak: 0, lastDone: null };
        let allTasks = JSON.parse(localStorage.getItem('tasks_v2')) || {};

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        
        function setCat(color) {
            currentCat = color;
            document.querySelectorAll('#category-selector button').forEach(b => b.classList.remove('active-cat'));
            document.getElementById('cat-' + color).classList.add('active-cat');
        }

        function toggleRepeat() {
            isRepeating = !isRepeating;
            document.getElementById('repeat-btn').classList.toggle('repeat-active', isRepeating);
        }

        function generateCalendar() {
            const strip = document.getElementById('calendar-strip');
            if(!strip) return;
            strip.innerHTML = '';
            const today = new Date(); today.setHours(0,0,0,0);
            for(let i = -7; i <= 30; i++) {
                let d = new Date(); d.setDate(today.getDate() + i); d.setHours(0,0,0,0);
                let active = d.getTime() === selectedDate.getTime();
                let card = document.createElement('div');
                card.className = `day-card flex flex-col items-center p-4 min-w-[65px] rounded-2xl glass cursor-pointer ${active ? 'active' : ''}`;
                card.onclick = () => { selectedDate = new Date(d); generateCalendar(); renderTasks(); };
                card.innerHTML = `<span class="text-[10px] uppercase font-bold opacity-60">${d.toLocaleDateString('cs', {weekday:'short'})}</span><span class="text-xl font-black">${d.getDate()}</span>`;
                strip.appendChild(card);
                if(active) card.scrollIntoView({behavior:'smooth', inline:'center'});
            }
            document.getElementById('month-display').innerText = selectedDate.toLocaleDateString('cs', {month:'long', year:'numeric'});
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            if(!list) return;
            const key = selectedDate.toISOString().split('T')[0];
            const tasks = allTasks[key] || [];
            list.innerHTML = tasks.length ? '' : '<p class="text-center opacity-30 mt-10 italic">Žádné úkoly</p>';
            tasks.forEach((t, i) => {
                let li = document.createElement('li');
                li.className = `glass p-5 rounded-[1.5rem] flex items-center gap-4 transition-all ${t.done ? 'opacity-40 grayscale' : ''}`;
                li.innerHTML = `
                    <div onclick="toggleTask(${i})" class="w-7 h-7 rounded-xl border-2 border-${t.cat}-500 flex items-center justify-center cursor-pointer ${t.done ? 'bg-'+t.cat+'-500' : ''}">
                        ${t.done ? '✓' : ''}
                    </div>
                    <div class="flex-grow">
                        <div class="flex items-center gap-2">
                            <p class="${t.done ? 'line-through' : 'font-bold'}">${t.text}</p>
                            ${t.repeat ? '<span class="text-[10px] opacity-40">🔄</span>' : ''}
                        </div>
                        <span class="text-[10px] opacity-60 uppercase font-black tracking-widest">${t.time || 'Plánováno'}</span>
                    </div>
                    <button onclick="deleteTask(${i})" class="p-2 opacity-20 hover:opacity-100">✕</button>
                `;
                list.appendChild(li);
            });
            updateStatsUI();
        }

        function addTask() {
            const input = document.getElementById('task-input');
            const time = document.getElementById('task-time');
            if(!input.value.trim()) return;
            const key = selectedDate.toISOString().split('T')[0];
            if(!allTasks[key]) allTasks[key] = [];
            allTasks[key].push({ 
                text: input.value, 
                cat: currentCat, 
                time: time.value, 
                done: false,
                repeat: isRepeating
            });
            input.value = '';
            // Resetování opakování po přidání pro čistý start příště
            isRepeating = false;
            document.getElementById('repeat-btn').classList.remove('repeat-active');
            save();
        }

        window.toggleTask = (i) => {
            const key = selectedDate.toISOString().split('T')[0];
            const task = allTasks[key][i];
            task.done = !task.done;
            
            if(task.done) { 
                userData.xp += 10; 
                checkStreak(); 
                
                // Logika opakování: pokud je úkol opakovací, vytvoř ho na zítřek
                if(task.repeat) {
                    const nextDay = new Date(selectedDate);
                    nextDay.setDate(nextDay.getDate() + 1);
                    const nextKey = nextDay.toISOString().split('T')[0];
                    
                    if(!allTasks[nextKey]) allTasks[nextKey] = [];
                    // Kontrola, zda už tam stejný úkol není (aby se neduplikoval při překlikávání)
                    const exists = allTasks[nextKey].some(st => st.text === task.text);
                    if(!exists) {
                        allTasks[nextKey].push({ ...task, done: false });
                    }
                }
            } else { 
                userData.xp = Math.max(0, userData.xp - 10); 
            }
            save();
        };

        function checkStreak() {
            const today = new Date().toISOString().split('T')[0];
            if(userData.lastDone !== today) { userData.streak++; userData.lastDone = today; }
        }

        function updateStatsUI() {
            const xpEl = document.getElementById('xp-val');
            const streakEl = document.getElementById('streak-val');
            if(xpEl) xpEl.innerText = userData.xp;
            if(streakEl) streakEl.innerText = userData.streak;
            localStorage.setItem('user_stats', JSON.stringify(userData));
        }

        window.deleteTask = (i) => { 
            const k = selectedDate.toISOString().split('T')[0]; 
            if(allTasks[k]) {
                allTasks[k].splice(i,1); 
                save(); 
            }
        };

        window.goToToday = () => { selectedDate = new Date(); selectedDate.setHours(0,0,0,0); generateCalendar(); renderTasks(); };
        function save() { localStorage.setItem('tasks_v2', JSON.stringify(allTasks)); renderTasks(); }
        
        document.addEventListener('DOMContentLoaded', () => {
            setCat('blue'); generateCalendar(); renderTasks();
        });
    </script>
</body>
</html>
